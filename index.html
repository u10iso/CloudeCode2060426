<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsubuyaki</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <h1 class="brand">Tsubuyaki</h1>
        <div id="userArea" class="user-area hidden">
            <span id="userEmail" class="user-email"></span>
            <button id="signOutBtn" class="btn btn-ghost">Sign out</button>
        </div>
    </header>

    <main class="container">
        <section id="authView" class="card">
            <div class="auth-tabs">
                <button class="auth-tab active" data-mode="signin">Sign in</button>
                <button class="auth-tab" data-mode="signup">Sign up</button>
            </div>
            <form id="authForm" class="auth-form">
                <label>
                    <span>Email</span>
                    <input type="email" id="authEmail" required autocomplete="email">
                </label>
                <label>
                    <span>Password</span>
                    <input type="password" id="authPassword" required minlength="6" autocomplete="current-password">
                </label>
                <button type="submit" id="authSubmit" class="btn btn-primary">Sign in</button>
                <p id="authMessage" class="message" role="status"></p>
            </form>
        </section>

        <section id="appView" class="hidden">
            <form id="postForm" class="card composer">
                <textarea id="postContent" maxlength="280" placeholder="いまどうしてる?" rows="3" required></textarea>
                <div class="composer-footer">
                    <span id="charCount" class="char-count">0 / 280</span>
                    <button type="submit" id="postSubmit" class="btn btn-primary">Post</button>
                </div>
            </form>

            <div class="timeline-header">
                <h2>Timeline</h2>
                <button id="refreshBtn" class="btn btn-ghost">Refresh</button>
            </div>
            <ul id="timeline" class="timeline">
                <li class="empty">読み込み中...</li>
            </ul>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
